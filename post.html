<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post | Crypto Tax Blog</title>
    <meta name="description" content="Read the latest crypto tax guide." />
    <link id="canonical-link" rel="canonical" href="https://example.com/post.html" />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="Post | Crypto Tax Blog" />
    <meta property="og:description" content="Read the latest crypto tax guide." />
    <meta property="og:url" content="https://example.com/post.html" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/13.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body class="bg-gray-50 text-gray-900 antialiased">
    <main class="mx-auto max-w-4xl px-4 py-10 sm:px-6">
      <div class="mb-6">
        <a
          href="./index.html"
          class="inline-flex items-center rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 shadow-sm transition hover:border-gray-400 hover:text-gray-900"
          >← Back to Home</a
        >
      </div>

      <article class="rounded-xl bg-white p-8 shadow-sm md:p-12">
        <div class="mb-4 flex flex-wrap items-center gap-3 text-sm text-gray-500">
          <p id="post-meta"></p>
          <span aria-hidden="true">•</span>
          <p id="reading-time" class="font-medium text-gray-700"></p>
        </div>
        <h1 id="post-title" class="text-4xl font-bold tracking-tight text-gray-900"></h1>
        <div id="post-content" class="mt-8"></div>
      </article>

      <p id="post-error" class="mt-8 hidden rounded-lg border border-red-300 bg-red-50 p-4 text-red-700">
        Could not load this post.
      </p>
    </main>

    <script src="./assets/js/post.js" defer></script>
  </body>
</html>
