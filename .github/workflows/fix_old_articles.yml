name: Fix old article titles and image URLs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run article fix script
        run: python fix_articles.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: repair old article titles and placeholder image URLs"
          branch: main
          file_pattern: "content/**/*"
